<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <style>
        .container {
            position: relative;
            width: 345px;
            height: 450px;
        }

        .left {
            height: 450px;
            /*  */
            position: absolute;
            top: 50%;
            left: 500px;
        }

        .left::before {
            content: '';
            position: absolute;
            inset: 0;
            background: blue;
            filter: blur(160px);
            z-index: -1;
        }

        .login-img {
            width: 345px;
            height: 100%;
            object-fit: cover;
            mask-image:
                linear-gradient(to bottom, transparent 0%, black 20%, black 100%),
                linear-gradient(to left, transparent 0%, black 20%, black 100%),
                linear-gradient(to top, transparent 0%, black 20%, black 100%),
                linear-gradient(to right, transparent 0%, black 20%, black 100%);
            -webkit-mask-image:
                linear-gradient(to bottom, transparent 0%, black 20%, black 100%),
                linear-gradient(to left, transparent 0%, black 20%, black 100%),
                linear-gradient(to top, transparent 0%, black 20%, black 100%),
                linear-gradient(to right, transparent 0%, black 20%, black 100%);
            mask-composite: intersect;
            -webkit-mask-composite: source-in;
        }
    </style>
    <body>
        <div class="container">
            <div class="left">
                < img class="login-img"
                    src="https://cdn.pixcc.net/large/127207944_p0_1200.webp"
                    alt="">
            </div>
        </div>
    </body>
</html>
