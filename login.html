<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <style>
        .container {
            display: flex;
            max-width: 70vw;
            height: 450px;
            aspect-ratio: 16 / 9;
            background-color: #fff;
            border: 1px solid #eaeaea;
            box-shadow: 0 0 25px #cacaca;
            margin: 10% auto;
        }

        .left {
            position: relative;
        }

        .login-img {
            width: 100%;
            height: 100%;
        }

        .right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .right-form {
            min-width: 20vw;
        }
    </style>

    <body>
        <div class="container">
            <div class="left">
                <img class="login-img"
                    src="assets/left_login.jpg"
                    alt="">
            </div>
            <div class="right">
                <div class="right-form">
                    <!-- 表单 -->
                </div>
            </div>
        </div>
    </body>

</html>
